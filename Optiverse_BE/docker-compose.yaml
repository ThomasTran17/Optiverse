version: '3.9'

services:
  reverse-proxy:
    image: traefik:v3.4
    command:
      - "--api.insecure=true"
      - "--providers.docker"
      - "--entrypoints.web.address=:81"
      - "--entrypoints.traefik.address=:9876"
      - "--entrypoints.web.http2.maxconcurrentstreams=100"
      - "--log.level=DEBUG"
    ports:
      - "81:81"
      - "9876:9876"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - app-network
    labels:
      - "traefik.http.middlewares.cors.headers.accessControlAllowMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH"
      - "traefik.http.middlewares.cors.headers.accessControlAllowHeaders=Content-Type,Authorization,X-User-Info"
      - "traefik.http.middlewares.cors.headers.accessControlAllowOriginList=http://localhost:5173,https://localhost:5173"
      - "traefik.http.middlewares.cors.headers.accessControlAllowCredentials=true"
      - "traefik.http.middlewares.cors.headers.accessControlMaxAge=3600"

  core-service:
    build:
      context: ./core-service
      dockerfile: Dockerfile
    volumes:
      - ./core-service:/app
      - /app/node_modules
    environment:
      - DATABASE_HOST=mongodb
      - DATABASE_PORT=27017
      - DATABASE_USER=admin
      - DATABASE_PASSWORD=123
      - JWT_SECRET=your-secret-key
    depends_on:
      - mongodb
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core.rule=PathPrefix(`/core`) && !Method(`OPTIONS`)"
      - "traefik.http.routers.core.entrypoints=web"
      - "traefik.http.services.core.loadbalancer.server.port=3000"
      - "traefik.http.routers.core.middlewares=core-stripprefix,cors"
      - "traefik.http.middlewares.core-stripprefix.stripprefix.prefixes=/core"
      # Router cho OPTIONS
      - "traefik.http.routers.core-options.rule=PathPrefix(`/core`) && Method(`OPTIONS`)"
      - "traefik.http.routers.core-options.priority=1000"
      - "traefik.http.routers.core-options.entrypoints=web"
      - "traefik.http.services.core.loadbalancer.server.port=3000"
      - "traefik.http.routers.core-options.middlewares=cors"

  productivity-service:
    build:
      context: ./productivity-service
      dockerfile: Dockerfile
    volumes:
      - ./productivity-service:/app
      - /app/node_modules
    environment:
      - DATABASE_HOST=mongodb
      - DATABASE_PORT=27017
      - DATABASE_USER=admin
      - DATABASE_PASSWORD=123
    depends_on:
      - mongodb
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      # Router JWT
      - "traefik.http.routers.productivity.rule=PathPrefix(`/productivity`) && !PathRegexp(`.*public.*`) && !Method(`OPTIONS`)"
      - "traefik.http.routers.productivity.priority=0"
      - "traefik.http.routers.productivity.entrypoints=web"
      - "traefik.http.services.productivity.loadbalancer.server.port=3001"
      - "traefik.http.services.productivity.loadbalancer.server.scheme=http"
      - "traefik.http.routers.productivity.middlewares=auth,productivity-stripprefix,cors"
      - "traefik.http.middlewares.auth.forwardAuth.address=http://core-service:3000/auth/verify"
      - "traefik.http.middlewares.auth.forwardAuth.trustForwardHeader=true"
      - "traefik.http.middlewares.auth.forwardAuth.authResponseHeaders=X-User-Info"
      - "traefik.http.middlewares.productivity-stripprefix.stripprefix.prefixes=/productivity"
      # Router non-JWT
      - "traefik.http.routers.productivity-public.rule=PathPrefix(`/productivity`) && PathRegexp(`.*public.*`) && !Method(`OPTIONS`)"
      - "traefik.http.routers.productivity-public.priority=1000"
      - "traefik.http.routers.productivity-public.entrypoints=web"
      - "traefik.http.services.productivity.loadbalancer.server.port=3001"
      - "traefik.http.services.productivity.loadbalancer.server.scheme=http"
      - "traefik.http.routers.productivity-public.middlewares=productivity-stripprefix,cors"
      # Router cho OPTIONS
      - "traefik.http.routers.productivity-options.rule=PathPrefix(`/productivity`) && Method(`OPTIONS`)"
      - "traefik.http.routers.productivity-options.priority=1000"
      - "traefik.http.routers.productivity-options.entrypoints=web"
      - "traefik.http.services.productivity.loadbalancer.server.port=3001"
      - "traefik.http.services.productivity.loadbalancer.server.scheme=http"
      - "traefik.http.routers.productivity-options.middlewares=cors"

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    volumes:
      - ./notification-service:/app
      - /app/node_modules
    environment:
      - DATABASE_HOST=mongodb
      - DATABASE_PORT=27017
      - DATABASE_USER=admin
      - DATABASE_PASSWORD=123
    depends_on:
      - mongodb
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      # Router JWT
      - "traefik.http.routers.notification.rule=PathPrefix(`/notification`) && !PathRegexp(`.*public.*`) && !Method(`OPTIONS`)"
      - "traefik.http.routers.notification.priority=0"
      - "traefik.http.routers.notification.entrypoints=web"
      - "traefik.http.services.notification.loadbalancer.server.port=3002"
      - "traefik.http.services.notification.loadbalancer.server.scheme=http"
      - "traefik.http.routers.notification.middlewares=auth,notification-stripprefix,cors"
      - "traefik.http.middlewares.auth.forwardAuth.address=http://core-service:3000/auth/verify"
      - "traefik.http.middlewares.auth.forwardAuth.trustForwardHeader=true"
      - "traefik.http.middlewares.auth.forwardAuth.authResponseHeaders=X-User-Info"
      - "traefik.http.middlewares.notification-stripprefix.stripprefix.prefixes=/notification"
      # Router non-JWT
      - "traefik.http.routers.notification-public.rule=PathPrefix(`/notification`) && PathRegexp(`.*public.*`) && !Method(`OPTIONS`)"
      - "traefik.http.routers.notification-public.priority=1000"
      - "traefik.http.routers.notification-public.entrypoints=web"
      - "traefik.http.services.notification.loadbalancer.server.port=3002"
      - "traefik.http.services.notification.loadbalancer.server.scheme=http"
      - "traefik.http.routers.notification-public.middlewares=notification-stripprefix,cors"
      # Router cho OPTIONS
      - "traefik.http.routers.notification-options.rule=PathPrefix(`/notification`) && Method(`OPTIONS`)"
      - "traefik.http.routers.notification-options.priority=1000"
      - "traefik.http.routers.notification-options.entrypoints=web"
      - "traefik.http.services.notification.loadbalancer.server.port=3002"
      - "traefik.http.services.notification.loadbalancer.server.scheme=http"
      - "traefik.http.routers.notification-options.middlewares=cors"

  mongodb:
    image: 'mongo:6'
    container_name: mongodb
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=123
    ports:
      - '27018:27017'
    volumes:
      - mongo_data:/data/db
    logging:
      driver: 'none'
    command: ['mongod', '--logpath', '/data/db/mongodb.log', '--logappend', '--quiet']
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge